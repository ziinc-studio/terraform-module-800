  '/v2/companies/{company}/ecid/lookups':
    post:
      tags:
        - 'Enhanced Caller ID'
      summary: 'Look up Enhanced Caller ID'
      description: 'Performs an enriched caller ID lookup for a single phone number. Returns identity, address, carrier, and demographic data. Live lookups are billed to the company; cached responses may not be billed again, including cached previously-not-found results, unless a fresh lookup is requested. Rate limited to 60 requests per minute per company. Contact support to request a higher limit.'
      operationId: ecidLookup
      parameters:
        -
          name: company
          in: path
          description: 'Company ID to bill the lookup to.'
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - number
              properties:
                number:
                  description: 'Phone number to look up. E.164 format recommended (e.g. +15551234567).'
                  type: string
                  example: '+15551234567'
                fresh:
                  description: 'When true, bypasses cache and forces a live lookup.'
                  type: boolean
                  default: false
                hints:
                  description: 'Optional hints to improve match quality.'
                  properties: { countryCode: { description: 'ISO 3166-1 alpha-2 country code hint.', type: string, maxLength: 2, minLength: 2, example: US }, postalCode: { description: 'Postal code hint.', type: string, example: '55746' }, name: { description: 'Name hint.', type: string, example: 'Ryan Nichols' } }
                  type: object
                include:
                  description: 'Reserved for future enrichment add-ons (e.g. "property"). Currently no values are supported.'
                  type: array
                  items: { type: string }
              type: object
      responses:
        '200':
          description: 'Lookup completed. Check matchStatus to determine if data was found.'
          headers:
            X-ECID-Cache:
              description: 'Cache status: HIT, MISS, or BYPASS'
              schema:
                type: string
                enum:
                  - HIT
                  - MISS
                  - BYPASS
          content:
            application/json:
              schema:
                properties:
                  data: { oneOf: [{ $ref: '#/components/schemas/EnhancedCallerId' }], nullable: true, description: 'Enriched caller ID data, or null if not found.' }
                  meta: { properties: { number: { description: 'Normalized E.164 phone number', type: string }, matchStatus: { description: 'Whether identity data was found', type: string, enum: [found, not_found] }, included: { description: 'Enrichment add-ons included in this response', type: array, items: { type: string } }, requestedAt: { type: string, format: date-time }, cache: { properties: { hit: { type: boolean }, mode: { type: string, enum: [default, bypass] } }, type: object } }, type: object }
                  enrichments: { description: 'Reserved for future enrichment datasets.', type: object, additionalProperties: true }
                type: object
        '403':
          description: 'ECID feature not enabled for this company, or user not authorized.'
        '422':
          description: 'Validation failed (e.g. invalid phone number format).'
        '429':
          description: 'Rate limit exceeded (60 requests/min). Contact support for higher limits.'
