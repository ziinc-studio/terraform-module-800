          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        Retry-After:
          $ref: '#/components/headers/Retry-After'
      content:
        application/json:
          schema:
            properties:
              data:
                $ref: '#/components/schemas/Callee'
            type: object
    WebhookResource:
      description: 'A single webhook'
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        Retry-After:
          $ref: '#/components/headers/Retry-After'
      content:
        application/json:
          schema:
            properties:
              data:
                $ref: '#/components/schemas/Webhook'
            type: object
    CallCollection:
      description: 'A paginated collection of calls'
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        Retry-After:
          $ref: '#/components/headers/Retry-After'
      content:
        application/json:
          schema:
            allOf:
              -
                $ref: '#/components/schemas/CursorPaginator'
              -
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Call' } }
                type: object
    CalleeCollection:
      description: 'A paginated collection of calls'
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        Retry-After:
          $ref: '#/components/headers/Retry-After'
      content:
        application/json:
          schema:
            allOf:
              -
                $ref: '#/components/schemas/CursorPaginator'
              -
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Callee' } }
                type: object
    CallAnalyticsWithNumber:
      description: "A list of call analytics metrics with number details.\n    When specifying `format=csv`, the CSV format will match the exported CSV format on the dashboard.\n    "
      content:
        application/json:
          schema:
            title: CallAnalyticsCalls
            properties:
              data:
                type: array
                items:
                  allOf: [{ $ref: '#/components/schemas/CallAnalyticsNumber' }, { $ref: '#/components/schemas/CallAnalyticsBase' }]
            type: object
    CallAnalyticsWithAnsweredBy:
      description: 'A list of call analytics metrics with number and answered by details'
      content:
        application/json:
          schema:
            title: CallAnalyticsCallsWithAnsweredBy
            properties:
              data:
                type: array
                items:
                  allOf: [{ properties: { answered_by: { $ref: '#/components/schemas/E164PhoneNumber' }, answered: { type: string, example: '80' } }, type: object }, { $ref: '#/components/schemas/CallAnalyticsNumber' }, { $ref: '#/components/schemas/CallAnalyticsBase' }]
            type: object
    CallAnalyticsWithGeo:
      description: 'A list of call analytics metrics with geo information'
      content:
        application/json:
          schema:
            title: CallAnalyticsByGeo
            properties:
              data:
                type: array
                items:
                  allOf: [{ properties: { geo: { type: string, example: TX } }, type: object }, { $ref: '#/components/schemas/CallAnalyticsBase' }]
            type: object
    CallAnalyticsWithTrafficSource:
      description: 'A list of call analytics metrics with traffic source information'
      content:
        application/json:
          schema:
            title: CallAnalyticsByTrafficSource
            properties:
              data:
                type: array
                items:
                  allOf: [{ properties: { trafficSource: { type: string, example: google_organic } }, type: object }, { $ref: '#/components/schemas/CallAnalyticsBase' }]
            type: object
    CallAnalyticsWithDniPool:
      description: 'A list of call analytics metrics with tracking pool information'
      content:
        application/json:
          schema:
            title: CallAnalyticsByDniPool
            properties:
              data:
                type: array
                items:
                  allOf: [{ properties: { dniPoolLabel: { type: string, example: 'My DNI Pool' } }, type: object }, { properties: { dniPoolId: { type: integer } }, type: object }, { $ref: '#/components/schemas/CallAnalyticsBase' }]
            type: object
    CallAnalyticsWithTag:
      description: "A list of call analytics metrics with tag details.\n    When specifying `format=csv`, the CSV format will match the exported CSV format on the dashboard.\n    "
      content:
        application/json:
          schema:
            title: CallAnalyticsWithTag
            properties:
              data:
                type: array
                items:
                  allOf: [{ $ref: '#/components/schemas/CallAnalyticsNumber' }, { $ref: '#/components/schemas/CallAnalyticsBase' }, { $ref: '#/components/schemas/CallAnalyticsTag' }]
            type: object
    CallAnalyticsWithNone:
      description: 'A list of call analytics metrics with no additional details'
      content:
        application/json:
          schema:
            title: CallAnalyticsWithNone
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/CallAnalyticsBase'
            type: object
  parameters:
    CompanyIdQueryString:
      name: companyId
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
    CursorPageSize:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    WebhookId:
      name: webhook
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    CompanyId:
      name: company
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    CallAnalyticsAnsweredBy:
      name: answered_by
      in: query
      description: 'Only show calls answered by the specified number'
      required: false
      schema:
        $ref: '#/components/schemas/E164PhoneNumber'
    CallAnalyticsNumberIds:
      name: number_ids
      in: query
      description: ''
      required: false
      schema:
        description: 'An array of number IDs'
        type: array
        items:
          type: integer
          example: 100523
    CallAnalyticsTagIds:
      name: tagIds
      in: query
      description: ''
      required: false
      schema:
        description: 'An array of tag IDs'
        type: array
        items:
          type: integer
          example: 100523
    CallAnalyticsExtensionLabels:
      name: extensionLabels
      in: query
      description: 'Filter results to specific extension labels'
      required: false
      schema:
        type: array
        items:
          type: string
          example: Sales
    CallAnalyticsSentiment:
      name: sentiment
      in: query
      description: 'Filter results to specific sentiment values'
      required: false
      schema:
        type: array
        items:
          type: string
          example: Positive
    CallAnalyticsUniqueCallers:
      name: isFirstContact
      in: query
      description: 'Only show calls with first contact in the specified time period'
      required: false
      schema:
        type: boolean
        default: false
    CallAnalyticsAnswerStatus:
      name: answerStatus
      in: query
      description: 'Answer status of the call'
      required: false
      schema:
        type: string
        enum:
          - all
          - answered
          - missed
    CallAnalyticsMinDuration:
      name: minDuration
      in: query
      description: 'Filter calls shorter than the specified duration'
      required: false
      schema:
        type: integer
        enum:
          - 15
          - 30
          - 60
          - 90
          - 120
          - 300
          - 600
    CallAnalyticsFormat:
      name: format
      in: query
      description: 'Optional format specifier to fetch a CSV'
      required: false
      schema:
        type: string
        enum:
          - csv
    CallAnalyticsStartDate:
      name: startDate
      in: query
      description: 'The start date in UTC'
      required: false
      schema:
        type: string
        example: '2023-01-01 00:00:00'
    CallAnalyticsEndDate:
      name: endDate
      in: query
      description: 'The end date in UTC'
      required: false
      schema:
        type: string
        example: '2023-01-01 00:00:00'
    CallAnalyticsCompanyId:
      name: company_id
      in: query
      required: true
      schema:
        type: integer
    CallAnalyticsGroups:
      name: groups
      in: query
      description: 'Optional array of FilterGroup-shaped filter conditions. AND-applied alongside the flat filter parameters; same semantics as the activity/dashboard/KPI endpoints.'
      required: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/FilterGroup'
  requestBodies:
    ImportContactsRequest:
      content:
        application/json:
          schema:
            title: ImportContactsRequest
            description: 'Import contact request body'
            required:
              - contacts
            properties:
              contacts:
                description: 'Fillable properties on the contact (eg label, company_name) can be added as additional properties to each contact.'
                type: array
                items:
                  required: [number]
                  properties: { number: { type: string }, groups: { type: array, items: { type: string } } }
                  type: object
                  additionalProperties: { type: string }
            type: object
    ContactBulkOperationRequest:
      content:
        application/json:
          schema:
            oneOf:
              -
                $ref: '#/components/schemas/IdListPayload'
              -
                $ref: '#/components/schemas/ExtendedSelectPayload'
    StoreWebhookRequest:
      content:
        application/json:
          schema:
            required:
              - url
              - method
              - features
            properties:
              url:
                type: string
              method:
                $ref: '#/components/schemas/WebhookSupportedHttpMethod'
              features:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookFeature'
            type: object
    UpdateWebhookRequest:
      content:
        application/json:
          schema:
            properties:
              url:
                type: string
              method:
                type: string
              features:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookFeature'
            type: object
    NumbersDataTableRequest:
      content:
        application/json:
          schema:
            title: NumbersDataTableRequest
            properties:
              businessUnitId:
                type: integer
              companyIds:
                type: array
                items:
                  type: integer
              accountStatuses:
                type: array
                items:
                  type: App\Enums\CompanyAccountStatus
              query:
                oneOf:
                  - { type: 'null' }
                  - { type: string }
              prefixes:
                type: array
                items:
                  type: string
              types:
                type: array
                items:
                  type: App\Business\Numbers\Repositories\SearchRepository\NumberType
              capabilities:
                type: array
                items:
                  type: App\Business\Numbers\Repositories\SearchRepository\Capability
              statuses:
                type: array
                items:
                  type: App\Business\Numbers\Repositories\SearchRepository\Status
              serviceTypes:
                type: array
                items:
                  type: App\Business\Numbers\Repositories\SearchRepository\ServiceType
              patterns:
                type: array
                items:
                  type: string
              verificationStatuses:
                type: array
                items:
                  type: App\Business\Numbers\Repositories\SearchRepository\VerificationStatus
              numberPoolTypes:
                type: array
                items:
                  type: integer
              vanity:
                type: boolean
              isSmsEnabled:
                type: boolean
              isMmsEnabled:
                type: boolean
              sorts:
                type: array
                items:
                  type: string
                  enum: []
              numberTemplateId:
                type: integer
              excludeNumberTemplateIds:
                type: array
                items:
                  type: integer
              selectedNumberIds:
                type: array
                items:
                  type: integer
              onlyAssignableToNumberTemplates:
                type: boolean
              isProvisioned:
                type: boolean
              exportColumns:
                type: array
                items:
                  type: string
              sources:
                description: 'Filter by DNI pool source slugs (OR). Include an empty string to also match numbers without any source.'
                type: array
                items:
                  type: string
            type: object
    WebhookRequest:
      content:
        application/json:
          schema:
            properties:
              feature:
                $ref: '#/components/schemas/WebhookFeature'
              data:
                oneOf:
                  - { $ref: '#/components/schemas/WebhookSmsReceivedPayload' }
            type: object
  headers:
    X-RateLimit-Limit:
      description: 'The maximum number of API requests that can be made in a 60 second interval.'
      schema:
        type: integer
    X-RateLimit-Remaining:
      description: 'The number of API requests available for this 60 second interval.'
      schema:
        type: integer
    Retry-After:
      description: 'Seconds remaining until your rate limit resets.'
      schema:
        type: integer
  securitySchemes:
    bearerAuth:
      type: http
      in: header
      bearerFormat: JWT
      scheme: bearer
security:
  -
    bearerAuth: []
tags: []
