openapi: 3.0.0
info:
  title: 'Public API'
  description: "The 800.com REST API allows developers to interact with their 800.com account programmatically. Whether you are\ninterested in searching vanity phone numbers, automating SMS messages, or creating triggers that auto replies based\non date and time conditions, our API aims to simplify the process while empowering users.\nOur API abides by the REST architectural style best practices.\n## Authentication\nAPI authentication is performed via a bearer token. You can obtain an API Personal Access Token from your\n800.com account, under the User Settings page. From there you are able to generate and manage as many tokens\nas necessary. Note that once a token has been generated we only store the hashed version of it. We are not\nable to retrieve your Personal Access Token in case you lose it.\nOnce you have generated a Personal Access Token you will need to include it with every API call. The token should\nbe placed in the header, under the `authorization` key. The value should be the word `Bearer`, followed by an\nempty space, and then your Personal Access Token:\n\n```json\nAuthorization: Bearer <token>\n```\nThroughout this website there are examples where you can try the endpoints directly from their documentation. If\nyou would like to try the endpoint make sure to add your own Personal Access Token. Note that some endpoints\nmight cost money (e.g. purchasing a number, or starting a new messaging campaign). Please proceed with\ncaution while testing the API endpoints with your live Personal Access Token.\n## Requests\nFor security purposes requests should come through HTTPS.\n### Content Type\nSome of the endpoints requests require a body. The required and optional fields for the body are listed within this\ndocument. All endpoint requests that require a body expect the data as JSON. Whenever that is\nthe case, a `content-type` key should be added to the request header, and the value should\nbe set to `application/json;charset=UTF-8`.\n## Response\n### Codes\nHere is a list of codes that can be returned by the server, and a brief description of their meaning.\n|Code|Description|\n|---|---|\n|200|Success|\n|401|Unauthenticated|\n|422|Request unprocessable|\n|429|Too Many Attempts|\n|500|Server Error|\nOn the rare occasion where the server returns code 500 we politely request that the user contacts our\nsupport team with more details.\n### Response Type\nOur servers will reply to every success call with a JSON response.\n\n## API Rate Limit\nTo prevent abuse our API has a rate limit of 60 calls per minute. An attempt to send more than 60 requests\nwithin a minute will result in every subsequent call to be replied to with a `429 - Too Many Attempts` for a\nfull minute.\nEvidence of the limit can be observed on the header of each response, where `X-RateLimit-Limit` is set\nto 60. If you would like to avoid going over the limit, the headers `X-RateLimit-Remaining` is provided,\ncontaining the amount of calls that can still be made within that minute."
  termsOfService: 'https://www.800.com/terms'
  version: '1.0'
servers:
  -
    url: 'https://api.800.com'
    description: 'The 800.com API server.'
  -
    url: 'https://api.localhost.8dni.xyz/'
    description: Local
  -
    url: 'http://api.localhost.800.com:8080'
    description: Local-http
  -
    url: 'https://dev-api.800.com'
    description: Development
  -
    url: 'https://stage-api.800.com'
    description: Staging
  -
    url: 'https://fallback-api.800.com'
    description: Fallback
